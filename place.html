<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Alfredo Cassanje">
    <meta name="description"
        content="Discover Angola, a beautiful country in Southern Africa, including its culture, geography, weather, and national information.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Angola | Discover Angola - WDD 131 Country Page</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <!-- JavaScript -->
    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Angola</h1>
    </header>

    <main>

        <!-- Hero Image -->
        <section class="hero">
            <picture>
                <source
                    media="(min-width: 768px)"
                    srcset="images/hero-large.webp">

                <img
                    src="images/hero-small.webp"
                    alt="Landscape of Angola">
            </picture>
        </section>

        
        <!-- Information Cards -->
        <section class="cards">

            <!-- Data Card -->
            <article class="card data">
                <h2>Data</h2>

                <dl>
                    <dt>Capital</dt>
                    <dd>Luanda</dd>

                    <dt>Population</dt>
                    <dd>36 Million</dd>

                    <dt>Languages</dt>
                    <dd>Portuguese</dd>

                    <dt>Currency</dt>
                    <dd>Angolan Kwanza (AOA)</dd>

                    <dt>Area</dt>
                    <dd>1,246,700 km²</dd>

                    <dt>Time Zone</dt>
                    <dd>UTC +1</dd>
                </dl>
            </article>

            <!-- Weather Card -->
            <article class="card weather">

                <h2>Weather</h2>

                <img
                    src="images/weather.svg"
                    alt="Weather icon"
                    class="weather-icon">

                <dl>
                    <dt>Temperature</dt>
                    <dd><span id="temperature">8°C</span></dd>

                    <dt>Conditions</dt>
                    <dd>Sunny</dd>

                    <dt>Wind</dt>
                    <dd><span id="windspeed">15 km/h</span></dd>

                    <dt>Wind Chill</dt>
                    <dd><span id="windchill"></span></dd>
                </dl>

            </article>

        </section>

    </main>

    <footer>
        <p>
            &copy; <span id="year"></span> | Alfredo Cassanje | Angola
        </p>

        <p>
            Last Modification:
            <span id="lastModified"></span>
        </p>
    </footer>

</body>

</html>
